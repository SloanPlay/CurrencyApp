<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>💱 Currency Converter Pro | Real-Time Exchange Rates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <div class="container">
    <h1>💱 Currency Converter Pro</h1>

    <input type="number" id="amount" placeholder="Enter amount (e.g. 100)" step="any" />

    <div class="selectors">
      <select id="fromCurrency"></select>
      <button id="swapBtn">⇄</button>
      <select id="toCurrency"></select>
    </div>

    <button id="convertBtn">Convert Now</button>

    <h2 id="result"></h2>

    <!-- Nueva sección de tasas populares -->
    <div class="popular-rates-section">
      <div class="section-header">
        <h3>Popular Exchange Rates</h3>
        <span class="update-badge">Live Updates</span>
      </div>
      
      <div class="table-container">
        <table class="rates-table" id="popularRatesTable">
          <thead>
            <tr>
              <th>From</th>
              <th>To</th>
              <th>Rate</th>
              <th>Change (24h)</th>
            </tr>
          </thead>
          <tbody id="ratesTableBody">
            <tr>
              <td colspan="4" class="loading-cell">Loading rates...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
